<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Pacientes - Trinidad LIMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-primary mb-4">
    <div class="container">
        <a class="navbar-brand" href="/">⬅ Volver al Dashboard</a>
    </div>
</nav>

<div class="container">
    <div class="card shadow border-0">
        <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center">
            <h4 class="m-0 fw-bold">Listado de Pacientes</h4>
            <button class="btn btn-primary">+ Agregar Paciente</button>
        </div>
        <div class="card-body">
            <table class="table table-hover">
                <thead class="table-light">
                    <tr>
                        <th>Identificación</th>
                        <th>Nombre Completo</th>
                        <th>Edad</th>
                        <th>Teléfono</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    {% for p in patients %}
                    <tr>
                        <td>{{ p.identificacion }}</td>
                        <td>{{ p.nombre }} {{ p.apellido }}</td>
                        <td>{{ p.get_edad() }} años</td>
                        <td>{{ p.telefono or 'S/N' }}</td>
                        <td>
                            <button class="btn btn-sm btn-info">Ver</button>
                        </td>
                    </tr>
                    {% else %}
                    <tr>
                        <td colspan="5" class="text-center py-4 text-muted">No hay pacientes registrados en el sistema.</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>

</body>
</html>
