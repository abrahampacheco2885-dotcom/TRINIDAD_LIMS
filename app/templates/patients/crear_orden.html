<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nueva Orden - Laboratory Information Management System Trinidad</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        .test-row:hover { background-color: #f0f7ff; cursor: pointer; }
        .sticky-summary { position: sticky; top: 20px; }
    </style>
</head>
<body class="bg-light p-4">
    <div class="container">
        <div class="row">
            <div class="col-md-8">
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
                        <h5 class="mb-0">Selección de Pruebas: {{ paciente.nombre }} {{ paciente.apellido }}</h5>
                        <span class="badge bg-white text-primary">ID: {{ paciente.identificacion }}</span>
                    </div>
                    <div class="card-body p-0">
                        <form id="orderForm" method="POST">
                            <div class="table-responsive" style="max-height: 600px; overflow-y: auto;">
                                <table class="table table-hover align-middle mb-0">
                                    <thead class="table-light sticky-top">
                                        <tr>
                                            <th class="text-center">#</th>
                                            <th>Examen / Perfil</th>
                                            <th class="text-end px-4">Precio ($)</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {% for e in examenes %}
                                        <tr class="test-row">
                                            <td class="text-center">
                                                      <input class="form-check-input test-checkbox" type="checkbox" name="tests" 
                                                          value="{{ e.id }}" data-price="{{ e.precio if e.precio else 0 }}" id="t_{{ e.id }}">
                                            </td>
                                            <td>
                                                <label class="d-block w-100 py-2" for="t_{{ e.id }}">
                                                    <strong>{{ e.nombre }}</strong> <small class="text-muted">({{ e.codigo }})</small>
                                                </label>
                                            </td>
                                            <td class="text-end px-4 fw-bold text-secondary">${{ e.precio }}</td>
                                        </tr>
                                        {% endfor %}
                                    </tbody>
                                </table>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card shadow-sm border-0 sticky-summary">
                    <div class="card-body">
                        <h5 class="fw-bold mb-4">Resumen de Facturación</h5>
                        <div class="d-flex justify-content-between mb-2">
                            <span>Subtotal:</span>
                            <span id="subtotal">$0.00</span>
                        </div>
                        <div class="d-flex justify-content-between mb-4 h4 fw-bold text-primary">
                            <span>TOTAL:</span>
                            <span id="total">$0.00</span>
                        </div>
                        <button type="submit" form="orderForm" class="btn btn-success btn-lg w-100 mb-2">
                            <i class="bi bi-printer"></i> Procesar Orden
                        </button>
                        <a href="{{ url_for('patients.lista_pacientes') }}" class="btn btn-outline-secondary w-100">
                            Cancelar
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const checkboxes = document.querySelectorAll('.test-checkbox');
        const totalDisplay = document.getElementById('total');
        const subtotalDisplay = document.getElementById('subtotal');

        checkboxes.forEach(cb => {
            cb.addEventListener('change', () => {
                let currentTotal = 0;
                checkboxes.forEach(c => {
                    if(c.checked) currentTotal += parseFloat(c.getAttribute('data-price'));
                });
                totalDisplay.innerText = `$${currentTotal.toFixed(2)}`;
                subtotalDisplay.innerText = `$${currentTotal.toFixed(2)}`;
            });
        });
    </script>
</body>
</html>
