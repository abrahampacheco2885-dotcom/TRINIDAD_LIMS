<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cargar Resultados - Laboratory Information Management System</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light p-5">
    <div class="container bg-white shadow p-4 rounded">
        <h3>Carga de Resultados</h3>
        <p><strong>Paciente:</strong> {{ orden.patient.nombre }} {{ orden.patient.apellido }}</p>
        <hr>
        
        <form method="POST">
            <div class="row">
                {% for t in tests %}
                <div class="col-md-6 mb-4">
                    <label class="form-label fw-bold">{{ t.test_nombre }}</label>
                    <div class="input-group">
                        <input type="text" name="resultado_{{ t.id }}" class="form-control" placeholder="Ingrese el valor..." required>
                        <span class="input-group-text">Unidad</span>
                    </div>
                </div>
                {% endfor %}
            </div>
            <hr>
            <div class="d-flex justify-content-between">
                <a href="/analysis/pendientes" class="btn btn-secondary">Volver</a>
                <button type="submit" class="btn btn-primary btn-lg">Finalizar y Guardar</button>
            </div>
        </form>
    </div>
</body>
</html>
