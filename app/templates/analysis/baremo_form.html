<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{{ 'Editar' if examen else 'Nuevo' }} Examen</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light p-5">
    <div class="container" style="max-width: 600px;">
        <div class="card shadow p-4">
            <h3 class="mb-4">{{ 'Editar Examen' if examen else 'Agregar Nuevo Examen al Baremo' }}</h3>
            <form method="POST">
                <div class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label">Código</label>
                        <input type="text" name="codigo" class="form-control" value="{{ examen.codigo if examen else '' }}" required placeholder="P20">
                    </div>
                    <div class="col-md-8">
                        <label class="form-label">Nombre</label>
                        <input type="text" name="nombre" class="form-control" value="{{ examen.nombre if examen else '' }}" required placeholder="PERFIL 20">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Unidad de Medida</label>
                        <input type="text" name="unidad" class="form-control" value="{{ examen.unidad_medida if examen else '' }}" placeholder="mg/dL">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Precio ($)</label>
                        <input type="number" step="0.01" name="precio" class="form-control" value="{{ examen.precio if examen else '' }}" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Valor Mínimo (Ref)</label>
                        <input type="number" step="0.001" name="min" class="form-control" value="{{ examen.valor_min if examen else '' }}">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Valor Máximo (Ref)</label>
                        <input type="number" step="0.001" name="max" class="form-control" value="{{ examen.valor_max if examen else '' }}">
                    </div>
                </div>
                <div class="mt-4">
                    <button type="submit" class="btn btn-primary w-100">Guardar Cambios</button>
                    <a href="{{ url_for('analysis.lista_baremo') }}" class="btn btn-link w-100 text-muted mt-2">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
