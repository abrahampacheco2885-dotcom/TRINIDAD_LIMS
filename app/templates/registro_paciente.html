<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro de Paciente - Trinidad</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h3>Nuevo Ingreso de Paciente</h3>
            </div>
            <div class="card-body">
                <form action="/paciente/nuevo" method="POST">
                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label>Cédula / ID</label>
                            <input type="text" name="identificacion" class="form-control" required placeholder="V-12345678">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label>Nombre</label>
                            <input type="text" name="nombre" class="form-control" required>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label>Apellido</label>
                            <input type="text" name="apellido" class="form-control" required>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label>Fecha de Nacimiento</label>
                            <input type="date" name="fecha_nacimiento" class="form-control" required>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label>Género</label>
                            <select name="genero" class="form-select">
                                <option value="M">Masculino</option>
                                <option value="F">Femenino</option>
                            </select>
                        </div>
                    </div>
                    <hr>
                    <button type="submit" class="btn btn-success w-100">Registrar y Pasar a Caja</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
