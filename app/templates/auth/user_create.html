{% extends 'base.html' %}
{% block content %}
<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card">
        <div class="card-header">Crear Usuario</div>
        <div class="card-body">
          <form method="POST">
            <div class="mb-3">
              <label class="form-label">Usuario</label>
              <input name="username" class="form-control" value="{{ form.username.data or '' }}">
            </div>
            <div class="mb-3">
              <label class="form-label">Contraseña</label>
              <input name="password" class="form-control" value="">
              <small class="text-muted">Dejar vacío para asignar contraseña temporal.</small>
              <div class="mt-2">
                <small class="text-muted">Política: mínimo 8 caracteres, al menos 6 dígitos, 1 mayúscula y 1 minúscula.</small>
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label">Nombre completo</label>
              <input name="nombre_completo" class="form-control" value="{{ form.nombre_completo.data or '' }}">
            </div>
            <div class="mb-3">
              <label class="form-label">Email</label>
              <input name="email" class="form-control" value="{{ form.email.data or '' }}">
            </div>
            <div class="mb-3">
              <label class="form-label">Rol</label>
              <select name="rol" class="form-select">
                {% for val,label in form.rol.choices %}
                  <option value="{{ val }}" {% if form.rol.data==val %}selected{% endif %}>{{ label }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="d-flex justify-content-end">
              <a href="{{ url_for('auth.users_list') }}" class="btn btn-secondary me-2">Cancelar</a>
              <button class="btn btn-primary">Crear</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
