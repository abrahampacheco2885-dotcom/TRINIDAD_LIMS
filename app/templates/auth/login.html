<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login - Laboratory Information Management System Trinidad</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #343a40; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .login-card { background: white; padding: 2rem; border-radius: 15px; width: 100%; max-width: 400px; }
    </style>
</head>
<body>
    <div class="login-card shadow-lg text-center">
        <img src="{{ url_for('static', filename='img/logo_icono.png') }}" alt="Logo" style="height: 60px;" class="mb-3">
        <h3 class="fw-bold text-primary">Acceso al Sistema</h3>
        <hr>
        <form method="POST">
            <div class="mb-3 text-start">
                <label class="form-label">Usuario</label>
                <input type="text" name="username" class="form-control" required>
            </div>
            <div class="mb-3 text-start">
                <label class="form-label">Contraseña</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Entrar</button>
        </form>
    </div>
</body>
</html>
