{% extends "base.html" %}
{% block content %}
<div class="container mt-5">
    <div class="row text-center">
        <div class="col-md-4">
            <div class="card shadow-sm p-4">
                <i class="bi bi-person-plus display-1 text-primary"></i>
                <h3 class="mt-3">Pacientes</h3>
                <p>Registro y base de datos.</p>
                <a href="{{ url_for('patients.nuevo_paciente') }}" class="btn btn-primary">Ir a Registro</a>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card shadow-sm p-4">
                <i class="bi bi-cash-coin display-1 text-success"></i>
                <h3 class="mt-3">Caja y Órdenes</h3>
                <p>Pagos y selección de exámenes.</p>
                <a href="{{ url_for('patients.lista_pacientes') }}" class="btn btn-success">Ver Lista / Cobrar</a>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card shadow-sm p-4">
                <i class="bi bi-file-earmark-medical display-1 text-info"></i>
                <h3 class="mt-3">Resultados</h3>
                <p>Carga de valores y PDF.</p>
                <a href="#" class="btn btn-info text-white">Próximamente</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
